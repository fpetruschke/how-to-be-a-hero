<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />

    <title>HTBAH App</title>
    <link
      rel="icon"
      type="image/png"
      href="assets/img/htbah-begleit-app-logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet" />
    <link
      href="https://unpkg.com/rpg-awesome/css/rpg-awesome.min.css"
      rel="stylesheet" />
    <link
      href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
      rel="stylesheet" />

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>

    <style>
      :root,
      [data-theme='dark'] {
        --bg-color: #0f172a;
        --text-color: #e5e7eb;
        --heading-color: #f9fafb;
        --paragraph-color: #cbd5f5;
        --list-color: #e2e8f0;
        --card-bg: #1e293b;
        --card-color: #f1f5f9;
        --border-color: #334155;
        --input-bg: #0f172a;
        --input-color: #f1f5f9;
        --placeholder-color: #64748b;
        --navbar-bg: #1e293b;
        --navbar-link: #cbd5f5;
        --primary-color: #3b82f6;
        --success-color: #22c55e;
        --danger-color: #ef4444;
        --warning-color: #f59e0b;
        --secondary-color: #64748b;
        --modal-backdrop: rgba(2, 6, 23, 0.75);
        --modal-bg: #1e293b;
      }

      [data-theme='light'] {
        --bg-color: #f8fafc;
        --text-color: #0f172a;
        --heading-color: #0f172a;
        --paragraph-color: #334155;
        --list-color: #1e293b;
        --card-bg: #ffffff;
        --card-color: #0f172a;
        --border-color: #cbd5e1;
        --input-bg: #ffffff;
        --input-color: #0f172a;
        --placeholder-color: #64748b;
        --navbar-bg: #ffffff;
        --navbar-link: #334155;
        --primary-color: #2563eb;
        --success-color: #16a34a;
        --danger-color: #dc2626;
        --warning-color: #d97706;
        --secondary-color: #64748b;
        --modal-backdrop: rgba(15, 23, 42, 0.4);
        --modal-bg: #ffffff;
      }

      body {
        background: var(--bg-color);
        color: var(--text-color);
        font-size: 16px;
      }

      .card {
        background: var(--card-bg);
        color: var(--card-color);
        border-radius: 16px;
        padding: 12px;
        border: 1px solid var(--border-color);
      }

      h2,
      h4,
      h5 {
        color: var(--heading-color);
      }

      p {
        color: var(--paragraph-color);
        margin-bottom: 6px;
      }

      ul {
        padding-left: 16px;
      }

      li {
        color: var(--list-color);
        margin-bottom: 4px;
      }

      input:not([type='checkbox']):not([type='radio']),
      select {
        background: var(--input-bg) !important;
        color: var(--input-color) !important;
        border: 1px solid var(--border-color) !important;
      }

      input::placeholder {
        color: var(--placeholder-color);
      }

      .btn-primary {
        background: var(--primary-color);
        border: none;
      }

      .btn-success {
        background: var(--success-color);
        border: none;
      }

      .btn-danger {
        background: var(--danger-color);
        border: none;
      }

      .btn-warning {
        background: var(--warning-color);
        border: none;
        color: #111827;
      }

      .btn-secondary {
        background: var(--secondary-color);
        border: none;
      }

      .navbar-fixed {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: var(--navbar-bg);
        border-top: 1px solid var(--border-color);
      }

      .navbar-fixed a {
        color: var(--navbar-link);
        text-decoration: none;
        font-size: 20px;
      }

      .navbar-fixed button {
        color: var(--navbar-link);
        text-decoration: none;
        font-size: 20px;
        background: transparent;
        border: none;
        padding: 0;
      }

      .navbar-fixed a.router-link-active {
        color: var(--primary-color);
      }

      .navbar-fixed button:hover {
        color: var(--primary-color);
      }

      .content {
        padding-bottom: 140px;
      }

      .navbar-fixed {
        height: 50px;
      }

      .regelwerk-modal-backdrop {
        position: fixed;
        inset: 0;
        background: var(--modal-backdrop);
        z-index: 2000;
      }

      .regelwerk-modal-window {
        position: absolute;
        top: 5vh;
        left: 5vw;
        width: 90vw;
        height: 85vh;
        min-width: 320px;
        min-height: 280px;
        resize: both;
        overflow: auto;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
        background: var(--modal-bg);
      }

      .regelwerk-modal-content {
        flex: 1;
        border: none;
      }

      .modal-content {
        background: var(--modal-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
      }

      .modal-header,
      .modal-footer {
        border-color: var(--border-color);
      }

      .form-check-input {
        border-color: var(--border-color);
      }

      .theme-toggle-input {
        width: 2.8em;
        height: 1.4em;
        cursor: pointer;
      }

      .action-card {
        display: block;
        transition: transform 0.15s ease, border-color 0.15s ease;
      }

      .action-card:hover {
        transform: translateY(-1px);
        border-color: var(--primary-color);
      }

      .action-card-arrow {
        color: var(--primary-color);
        font-size: 28px;
      }

      .charakterbild-vorschau {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
      }

      .charakterbild-vorschau-klein {
        max-height: 180px;
        width: auto;
        max-width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
      }

      .charakterbild-platzhalter {
        width: 100%;
        aspect-ratio: 3 / 4;
        border-radius: 10px;
        border: 1px dashed var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--paragraph-color);
        background: var(--input-bg);
      }

      .charakterbild-platzhalter-klein {
        max-height: 180px;
        width: 100%;
        border-radius: 10px;
        border: 1px dashed var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--paragraph-color);
        background: var(--input-bg);
        aspect-ratio: 3 / 4;
      }

      .cropper-image {
        max-width: 100%;
        max-height: 60vh;
        display: block;
      }

      .quill-editor-host {
        min-height: 60vh;
      }

      .quill-editor-host .ql-toolbar.ql-snow,
      .quill-editor-host .ql-container.ql-snow {
        border-color: var(--border-color);
      }

      .quill-editor-host .ql-toolbar.ql-snow {
        background: var(--card-bg);
      }

      .quill-editor-host .ql-container.ql-snow {
        background: var(--input-bg);
      }

      .quill-editor-host .ql-editor {
        color: var(--text-color);
      }

      .quill-editor-host .ql-editor.ql-blank::before {
        color: var(--placeholder-color);
      }

      .wuerfel-ergebnis-chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .wuerfel-ergebnis-chip-w10 {
        background: rgba(59, 130, 246, 0.2);
        color: var(--text-color);
        border: 1px solid rgba(59, 130, 246, 0.5);
      }

      .wuerfel-ergebnis-chip-w100 {
        background: rgba(34, 197, 94, 0.2);
        color: var(--text-color);
        border: 1px solid rgba(34, 197, 94, 0.5);
      }

      .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }

      [data-theme='dark'] .btn-close {
        filter: invert(1) grayscale(100%) brightness(200%);
      }
    </style>
  </head>

  <body>
    <div id="app"></div>

    <script src="pages/Startseite.js"></script>
    <script src="pages/CharakterErstellung.js"></script>
    <script src="pages/Abenteuer.js"></script>
    <script src="pages/Einstellungen.js"></script>
    <script src="pages/PresetVerwaltung.js"></script>
    <script src="pages/PresetEditor.js"></script>
    <script src="components/RegelwerkModal.js"></script>
    <script src="components/BottomNav.js"></script>
    <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = document.querySelectorAll(
          '[data-bs-toggle="tooltip"]',
        );
        tooltipTriggerList.forEach((el) => new bootstrap.Tooltip(el));
      });
    </script>
  </body>
</html>
