<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />

    <title>HTBAH App</title>
    <link
      rel="icon"
      type="image/png"
      href="assets/img/htbah-begleit-app-logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet" />
    <link
      href="https://unpkg.com/rpg-awesome/css/rpg-awesome.min.css"
      rel="stylesheet" />
    <link
      href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
      rel="stylesheet" />
    <link
      href="main.css"
      rel="stylesheet" />

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  </head>

  <body>
    <div id="app"></div>

    <script src="pages/Startseite.js"></script>
    <script src="pages/CharakterErstellung.js"></script>
    <script src="pages/Abenteuer.js"></script>
    <script src="pages/Einstellungen.js"></script>
    <script src="pages/PresetVerwaltung.js"></script>
    <script src="pages/PresetEditor.js"></script>
    <script src="components/RegelwerkModal.js"></script>
    <script src="components/BottomNav.js"></script>
    <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script src="main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const tooltipTriggerList = document.querySelectorAll(
          '[data-bs-toggle="tooltip"]',
        );
        tooltipTriggerList.forEach((el) => new bootstrap.Tooltip(el));
      });
    </script>
  </body>
</html>
